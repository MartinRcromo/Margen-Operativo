
<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Calculadora de Margen Operativo (CSV)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0b1020;
      --stroke:rgba(255,255,255,.08);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.65);
      --muted2:rgba(255,255,255,.45);
      --accent:#6ee7ff;
      --good:#34d399;
      --warn:#fbbf24;
      --bad:#fb7185;
      --shadow: 0 18px 45px rgba(0,0,0,.45);
      --radius: 16px;
    }
    [data-theme="light"]{
      --bg:#f6f7fb;
      --stroke:rgba(17,24,39,.10);
      --text:rgba(17,24,39,.92);
      --muted:rgba(17,24,39,.65);
      --muted2:rgba(17,24,39,.45);
      --accent:#0ea5e9;
      --good:#16a34a;
      --warn:#d97706;
      --bad:#e11d48;
      --shadow: 0 18px 45px rgba(0,0,0,.08);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 700px at 20% 10%, rgba(110,231,255,.18), transparent 60%),
                  radial-gradient(900px 600px at 90% 0%, rgba(99,102,241,.16), transparent 55%),
                  var(--bg);
      color:var(--text);
    }
    .wrap{ max-width: 1600px; margin: 22px auto; padding: 0 16px 30px; }

    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:12px; padding:16px 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .brand{ display:flex; flex-direction:column; gap:4px; }
    .brand h1{ margin:0; font-size:16px; letter-spacing:.2px; }
    .brand small{ color:var(--muted); font-size:12px; }

    .actions{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
    .btn{
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.06);
      color:var(--text);
      padding:10px 12px;
      border-radius: 12px;
      cursor:pointer;
      font-weight:700;
      font-size:12px;
      transition:.15s ease;
      display:inline-flex; gap:8px; align-items:center;
    }
    .btn:hover{ transform: translateY(-1px); background: rgba(255,255,255,.10); }
    .btn:active{ transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn.primary{
      background: linear-gradient(180deg, rgba(110,231,255,.25), rgba(110,231,255,.08));
      border-color: rgba(110,231,255,.35);
    }
    [data-theme="light"] .btn.primary{
      background: linear-gradient(180deg, rgba(14,165,233,.18), rgba(14,165,233,.06));
      border-color: rgba(14,165,233,.28);
    }
    .btn.danger{
      background: linear-gradient(180deg, rgba(251,113,133,.20), rgba(251,113,133,.06));
      border-color: rgba(251,113,133,.30);
    }

    .file-input-label {
      border:1px dashed var(--stroke);
      padding:10px 12px; border-radius:12px;
      color:var(--muted);
      background: rgba(255,255,255,.03);
      display:inline-flex; align-items:center; gap:10px;
      cursor: pointer;
    }
    
    .dun-filter-bar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
      padding: 12px 16px;
      margin-top: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .dun-filter-bar .filter-label {
        font-size: 13px;
        font-weight: 800;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .2px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
      align-items: stretch;
    }
    @media (max-width: 1300px){ .grid{ grid-template-columns: 1fr 1fr; } }
    @media (max-width: 900px){ .grid{ grid-template-columns: 1fr; } }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex;
      flex-direction: column;
    }
    .card-header{
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
    }
    .card-header .header-buttons {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-header .close-btn, .card-header .collapse-btn {
        background: transparent;
        border: none;
        color: var(--muted);
        font-size: 20px;
        cursor: pointer;
        line-height: 1;
        padding: 0;
        width: 26px;
        height: 26px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background .15s ease, color .15s ease;
    }
    .card-header .close-btn:hover, .card-header .collapse-btn:hover {
        background: rgba(255,255,255,.08);
        color: var(--text);
    }

    .card h2, .card-header h2 {
      margin:0;
      font-size:13px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing:.2px;
      text-transform: uppercase;
    }
    .card > h2 { margin-bottom: 14px; }


    .kpis{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      flex: 1;
    }
    .kpi-main{
      grid-column: span 2;
    }

    .kpi{
      padding:16px;
      border-radius: 14px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .kpi .label{ font-size:11px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
    .kpi .value{ margin-top:6px; font-size:20px; font-weight: 900; letter-spacing:.2px; }
    .kpi .sub{ margin-top:4px; font-size:11px; color: var(--muted2); }

    .pill{
      display:inline-flex; align-items:center; gap:6px;
      padding:4px 10px;
      border-radius: 999px;
      border:1px solid var(--stroke);
      font-size:11px; font-weight: 800;
      color: var(--muted);
      background: rgba(255,255,255,.04);
      white-space: nowrap;
    }
    .dot{ width:7px; height:7px; border-radius:999px; background: var(--muted2); display:inline-block; }
    .pill.good .dot{ background: var(--good); }
    .pill.warn .dot{ background: var(--warn); }
    .pill.bad .dot{ background: var(--bad); }

    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .row .left{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }

    .search{
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.03);
      color: var(--text);
      border-radius: 12px;
      padding:10px 12px;
      font-size:12px;
      outline: none;
    }
    .search::placeholder{ color: var(--muted2); }
    .search option {
        background: var(--bg);
        color: var(--text);
    }


    .tabs{
      display:flex; gap:8px; align-items:center;
      border:1px solid var(--stroke);
      border-radius: 999px;
      padding:4px;
      background: rgba(255,255,255,.03);
    }
    .tab{
      padding:8px 14px;
      border-radius: 999px;
      font-size:12px;
      font-weight:900;
      color: var(--muted);
      cursor:pointer;
      border:1px solid transparent;
      background: transparent;
    }
    .tab.active{
      color: var(--text);
      border-color: rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
    }

    .tableWrap{
      border:1px solid var(--stroke);
      border-radius: 14px;
      overflow:auto;
      max-height: 60vh;
      background: rgba(255,255,255,.02);
    }
    table{ width:100%; border-collapse:separate; border-spacing:0; font-size:12px; }
    th, td{ padding:10px 12px; border-bottom:1px solid var(--stroke); text-align:right; }
    th{
      position: sticky; top:0;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
      font-size:11px; color: var(--muted);
      text-transform: uppercase;
      letter-spacing:.5px;
      z-index: 2;
      transition: background .2s;
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { background: rgba(255,255,255,0.1); }
    [data-theme="light"] th{ background: rgba(255,255,255,.9); }
    [data-theme="light"] th.sortable:hover { background: rgba(0,0,0,0.05); }

    td:first-child, th:first-child{ text-align:left; }
    tr:hover td{ background: rgba(255,255,255,.04); }
    .off{ opacity:.45; filter: grayscale(.3); }
    
    .footnote{ margin-top:10px; color: var(--muted2); font-size:11px; line-height:1.45; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toggle{ display:inline-flex; align-items:center; gap:8px; user-select:none; }
    .toggle input{ transform: translateY(1px); }

    .driverChip{
      font-weight:900;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      display:inline-block;
      text-transform: uppercase;
      font-size:10px;
    }

    .banner{
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .banner strong{ display:block; margin-bottom:0; flex-shrink: 0; }

    .scenarioGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 500px){ .scenarioGrid{ grid-template-columns: 1fr; } }
    .sliderRow{
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.03);
      border-radius: 14px;
      padding: 12px;
      transition: background .2s ease;
    }
    .sliderTop{
      display:flex; justify-content:space-between; align-items:center; gap:10px;
      margin-bottom: 8px;
    }
    .sliderTop .name{ font-weight:800; font-size:11px; color: var(--text); text-transform: uppercase; }
    .sliderTop .val{ font-weight:900; font-size:12px; color: var(--accent); min-width: 60px; text-align:right; }
    input[type="range"]{ width:100%; accent-color: var(--accent); cursor: pointer; }
    
    .sliderRow.warn-slider .sliderTop .val { color: var(--warn); }
    .sliderRow.warn-slider input[type="range"] { accent-color: var(--warn); }
    
    .sliderRow-interactive:hover {
        cursor: pointer;
        background: rgba(255,255,255,.06);
    }

    .placeholder-card{
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--muted2);
        font-size: 13px;
        text-align: center;
        min-height: 200px;
        flex: 1;
    }

    .cost-detail-view {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding-top: 4px;
        flex: 1;
    }
    .cost-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 14px;
        border: 1px solid var(--stroke);
        border-radius: 12px;
        background: rgba(255,255,255,.03);
        font-size: 12px;
        transition: background .2s ease;
    }
    .cost-item.expandable { user-select:none; cursor: pointer; }
    .cost-item.expandable:hover { background: rgba(255,255,255,.06); }

    .cost-item span:first-child {
        color: var(--muted);
        font-weight: 600;
        display:flex;
        align-items:center;
    }
    .cost-item .cost-value {
        font-weight: 900;
        font-size: 13px;
    }
    .cost-item.total {
        background: rgba(110,231,255,.06);
        border-color: rgba(110,231,255,.15);
    }
    .cost-item.total span:first-child{
      color: var(--text);
      font-weight: 800;
    }
    .cost-item.total .cost-value {
        color: var(--accent);
        font-size: 14px;
    }

    .expand-indicator {
        transition: transform 0.2s;
        display: inline-block;
        margin-right: 8px;
        font-size: 10px;
        color: var(--muted2);
    }
    .expand-indicator.expanded { transform: rotate(90deg); }

    .cost-detail-breakdown {
        padding: 8px 14px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        background: rgba(0,0,0,.15);
        border-top: 1px solid var(--stroke);
        margin: 8px -14px -8px;
    }
    .breakdown-item {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--muted);
    }
    .breakdown-item .value {
        font-weight: 700;
        color: var(--text);
    }
    
    .card.is-collapsed .card-header {
      margin-bottom: 0;
    }
    .collapsible-content {
      transition: max-height 0.35s ease-in-out, opacity 0.2s ease-in-out, margin-top 0.35s ease-in-out;
      overflow: hidden;
      max-height: 1000px;
      opacity: 1;
    }
    .collapsible-content.collapsed {
      max-height: 0;
      opacity: 0;
    }
    
    .pnl-container {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding-top: 8px;
        flex: 1;
    }
    .pnl-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 0;
    }
    .pnl-label {
        font-size: 12px;
        color: var(--muted);
    }
    .pnl-value {
        font-size: 13px;
        font-weight: 700;
        font-family: 'Inter', monospace;
    }
    .pnl-separator {
        border: 0;
        height: 1px;
        background-image: linear-gradient(to right, transparent, var(--stroke), transparent);
        margin: 6px 0;
    }
    .pnl-item.subtotal .pnl-label {
        color: var(--text);
        font-weight: 600;
    }
    .pnl-item.subtotal .pnl-value {
        font-weight: 900;
        color: var(--accent);
    }
    .pnl-item.total {
        margin-top: 4px;
        padding: 8px;
        border-radius: 12px;
        background: rgba(255,255,255,.04);
        border: 1px solid var(--stroke);
    }
    .pnl-item.total .pnl-label {
        font-size: 14px;
        color: var(--text);
        font-weight: 800;
    }
    .pnl-item.total .pnl-value {
        font-size: 16px;
        font-weight: 900;
        color: var(--good);
    }
    .pnl-item.total .pnl-value.negative {
        color: var(--bad);
    }
    
    .insight-card {
        cursor: pointer;
        transition: transform .15s ease, background .15s ease;
    }
    .insight-card:hover {
        transform: translateY(-2px) scale(1.01);
        background: rgba(255,255,255,.08) !important;
    }

    /* Gastos Bar Chart Styles */
    .gastos-chart-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 8px;
        max-height: 60vh;
        overflow-y: auto;
    }
    .gasto-bar-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
    .gasto-bar-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        gap: 10px;
    }
    .gasto-name {
        font-weight: 800;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .gasto-details {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }
    .gasto-amount {
        font-weight: 700;
        color: var(--muted);
        min-width: 70px; /* Align amounts */
        text-align: right;
    }
    .gasto-bar-wrapper {
        width: 100%;
        background: rgba(255,255,255,.03);
        border-radius: 999px;
        height: 10px;
        border: 1px solid var(--stroke);
        overflow: hidden; /* Ensure bar stays within rounded corners */
    }
    .gasto-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), rgba(110,231,255,.4));
        border-radius: 999px;
        transition: width 0.3s ease-out;
    }

    .drilldown-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 0 8px; /* Match chart container padding */
    }
    .drilldown-header h3 {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: .2px;
      text-transform: uppercase;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Scenario Detail View */
    .scenario-detail-view {
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .scenario-detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .scenario-detail-header h3 {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: .2px;
      text-transform: uppercase;
    }
    .scenario-detail-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 220px; /* Adjust as needed */
      overflow-y: auto;
      padding-right: 8px; /* For scrollbar */
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-content {
      background: var(--bg);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .modal-content h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
    }
    .form-group input, .form-group select {
      width: 100%;
      border: 1px solid var(--stroke);
      background: rgba(255, 255, 255, .03);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      outline: none;
    }
    .form-group select option {
      background: var(--bg);
      color: var(--text);
    }
    .form-group.full-width {
      grid-column: span 2;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 8px;
    }
    .error-text {
      font-size: 11px;
      color: var(--bad);
      margin-top: 4px;
      min-height: 14px;
    }
    
    .insight-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .insight-details-box {
      border-left: 3px solid var(--accent);
      padding: 12px 16px;
      background: rgba(255,255,255,.03);
      border-radius: 0 12px 12px 0;
    }
    .insight-details-box h3 {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--muted);
    }
    .insight-details-box p {
      margin: 0;
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
    }

  </style>

</head>

<body data-theme="dark">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
